version: "3.8"

services:
  mongo:
    image: mongo
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./node-express-mongodb
    container_name: backend
    ports:
      - "8080:8080"
    depends_on:
      - mongo

  frontend:
    build: ./client
    environment:
    - REACT_APP_API_URL=http://backend:8080
    container_name: frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  mongo-data:
